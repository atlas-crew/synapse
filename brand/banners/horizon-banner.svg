<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Recursive:slnt,wght,CASL,CRSV,MONO@-15..0,300..900,0..1,0..1,0..1&amp;display=swap');</style>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#131c2e"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </linearGradient>
    <radialGradient id="glow-coral" cx="0.35" cy="0.45" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="0.7" cy="0.6" r="0.4" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1E90FF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#1E90FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow-coral)"/>
  <rect width="1280" height="640" fill="url(#glow-blue)"/>

  <!-- Grid -->
  <g stroke="#1e90ff" stroke-width="0.5" opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="640"/><line x1="60" y1="0" x2="60" y2="640"/>
    <line x1="120" y1="0" x2="120" y2="640"/><line x1="180" y1="0" x2="180" y2="640"/>
    <line x1="240" y1="0" x2="240" y2="640"/><line x1="300" y1="0" x2="300" y2="640"/>
    <line x1="360" y1="0" x2="360" y2="640"/><line x1="420" y1="0" x2="420" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/><line x1="540" y1="0" x2="540" y2="640"/>
    <line x1="600" y1="0" x2="600" y2="640"/><line x1="660" y1="0" x2="660" y2="640"/>
    <line x1="720" y1="0" x2="720" y2="640"/><line x1="780" y1="0" x2="780" y2="640"/>
    <line x1="840" y1="0" x2="840" y2="640"/><line x1="900" y1="0" x2="900" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/><line x1="1020" y1="0" x2="1020" y2="640"/>
    <line x1="1080" y1="0" x2="1080" y2="640"/><line x1="1140" y1="0" x2="1140" y2="640"/>
    <line x1="1200" y1="0" x2="1200" y2="640"/><line x1="1260" y1="0" x2="1260" y2="640"/>
    <line x1="0" y1="60" x2="1280" y2="60"/><line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="180" x2="1280" y2="180"/><line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="300" x2="1280" y2="300"/><line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="420" x2="1280" y2="420"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="540" x2="1280" y2="540"/><line x1="0" y1="600" x2="1280" y2="600"/>
  </g>

  <!-- Large icon (left-center, faded) -->
  <g transform="translate(120,160) scale(2.9)" opacity="0.12">
    <line x1="18" y1="50" x2="92" y2="50" stroke="#1e90ff" stroke-width="1.5" stroke-linecap="square" opacity="0.25"/>
    <path d="M20,50 A35,32 0 0 1 90,50" fill="none" stroke="#f97316" stroke-width="5" stroke-linecap="square"/>
    <path d="M34,50 A21,19 0 0 1 76,50" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="square" opacity="0.45"/>
    <circle cx="55" cy="50" r="4.5" fill="#f97316"/>
    <line x1="55" y1="55" x2="26" y2="94" stroke="#1e90ff" stroke-width="3.5" stroke-linecap="square"/>
    <line x1="55" y1="55" x2="84" y2="94" stroke="#1e90ff" stroke-width="3.5" stroke-linecap="square"/>
    <line x1="55" y1="55" x2="18" y2="82" stroke="#f97316" stroke-width="2" stroke-linecap="square" opacity="0.45"/>
    <line x1="55" y1="55" x2="92" y2="82" stroke="#f97316" stroke-width="2" stroke-linecap="square" opacity="0.45"/>
  </g>

  <!-- Icon (actual size, next to wordmark) -->
  <g transform="translate(434,222)">
    <rect width="110" height="110" fill="#0c1220"/>
    <line x1="18" y1="50" x2="92" y2="50" stroke="#1e90ff" stroke-width="1.5" stroke-linecap="square" opacity="0.25"/>
    <path d="M20,50 A35,32 0 0 1 90,50" fill="none" stroke="#f97316" stroke-width="5" stroke-linecap="square"/>
    <path d="M34,50 A21,19 0 0 1 76,50" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="square" opacity="0.45"/>
    <circle cx="55" cy="50" r="4.5" fill="#f97316"/>
    <line x1="55" y1="55" x2="26" y2="94" stroke="#1e90ff" stroke-width="3.5" stroke-linecap="square"/>
    <line x1="55" y1="55" x2="84" y2="94" stroke="#1e90ff" stroke-width="3.5" stroke-linecap="square"/>
    <line x1="55" y1="55" x2="18" y2="82" stroke="#f97316" stroke-width="2" stroke-linecap="square" opacity="0.45"/>
    <line x1="55" y1="55" x2="92" y2="82" stroke="#f97316" stroke-width="2" stroke-linecap="square" opacity="0.45"/>
    <g stroke="#5a6f8a" stroke-width="1.5" fill="none" opacity="0.3">
      <polyline points="8,20 8,8 20,8"/><polyline points="90,8 102,8 102,20"/>
      <polyline points="102,90 102,102 90,102"/><polyline points="20,102 8,102 8,90"/>
    </g>
  </g>

  <!-- Wordmark (LIVE TEXT) -->
  <text x="580" y="298" font-family="Recursive, monospace" font-weight="700" font-size="64" letter-spacing="2" fill="#f97316">HORIZON</text>

  <!-- Rule + tagline -->
  <line x1="570" y1="324" x2="600" y2="324" stroke="#2a3f5c" stroke-width="1"/>
  <text x="620" y="328" font-family="Recursive, monospace" font-weight="500" font-size="13" letter-spacing="3" fill="#5a6f8a">SEE FURTHER. ACT FASTER.</text>

  <!-- Module labels -->
  <g transform="translate(570,390)">
    <!-- Synapse -->
    <text x="0" y="0" font-family="Recursive, monospace" font-weight="600" font-size="12" letter-spacing="2.5" fill="#8b5cf6">SYNAPSE</text>
    <text x="0" y="16" font-family="Recursive, monospace" font-weight="400" font-size="9" letter-spacing="1.5" fill="#5a6f8a">DEFENSE</text>

    <!-- Bridge -->
    <text x="130" y="0" font-family="Recursive, monospace" font-weight="600" font-size="12" letter-spacing="2.5" fill="#f97316">BRIDGE</text>
    <text x="130" y="16" font-family="Recursive, monospace" font-weight="400" font-size="9" letter-spacing="1.5" fill="#5a6f8a">DEPLOYMENT</text>

    <!-- Beam -->
    <text x="240" y="0" font-family="Recursive, monospace" font-weight="600" font-size="12" letter-spacing="2.5" fill="#f97316">BEAM</text>
    <text x="240" y="16" font-family="Recursive, monospace" font-weight="400" font-size="9" letter-spacing="1.5" fill="#5a6f8a">OBSERVABILITY</text>
  </g>

  <!-- Decorative converging paths (bottom right) -->
  <g opacity="0.06">
    <line x1="1100" y1="400" x2="950" y2="600" stroke="#1e90ff" stroke-width="4" stroke-linecap="square"/>
    <line x1="1100" y1="400" x2="1250" y2="600" stroke="#1e90ff" stroke-width="4" stroke-linecap="square"/>
    <path d="M1010,400 A90,80 0 0 1 1190,400" fill="none" stroke="#f97316" stroke-width="5" stroke-linecap="square"/>
    <circle cx="1100" cy="400" r="8" fill="#f97316"/>
  </g>

  <!-- Corner brackets -->
  <g stroke="#5a6f8a" stroke-width="2" fill="none" opacity="0.15">
    <polyline points="24,56 24,24 56,24"/><polyline points="1224,24 1256,24 1256,56"/>
    <polyline points="1256,584 1256,616 1224,616"/><polyline points="56,616 24,616 24,584"/>
  </g>
</svg>
