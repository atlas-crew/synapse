<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#080e1a"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <line x1="60" y1="0" x2="60" y2="60" stroke="#1E90FF" stroke-width="0.3" opacity="0.08"/>
      <line x1="0" y1="60" x2="60" y2="60" stroke="#1E90FF" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Atmospheric glow -->
  <ellipse cx="350" cy="260" rx="400" ry="300" fill="#F97316" opacity="0.025"/>
  <ellipse cx="900" cy="400" rx="350" ry="250" fill="#8B5CF6" opacity="0.02"/>

  <!-- Corner brackets -->
  <g stroke="#5a6f8a" stroke-width="1.5" fill="none" opacity="0.15">
    <polyline points="40,72 40,40 72,40"/>
    <polyline points="1208,40 1240,40 1240,72"/>
    <polyline points="1240,568 1240,600 1208,600"/>
    <polyline points="72,600 40,600 40,568"/>
  </g>

  <!-- Horizon icon -->
  <g transform="translate(280, 200) scale(0.8)">
    <line x1="18" y1="50" x2="92" y2="50" stroke="#1E90FF" stroke-width="1.5" stroke-linecap="square" opacity="0.25"/>
    <path d="M20,50 A35,32 0 0 1 90,50" fill="none" stroke="#F97316" stroke-width="5" stroke-linecap="square"/>
    <path d="M34,50 A21,19 0 0 1 76,50" fill="none" stroke="#F97316" stroke-width="2.5" stroke-linecap="square" opacity="0.45"/>
    <circle cx="55" cy="50" r="4.5" fill="#F97316"/>
    <line x1="55" y1="55" x2="26" y2="94" stroke="#1E90FF" stroke-width="3.5" stroke-linecap="square"/>
    <line x1="55" y1="55" x2="84" y2="94" stroke="#1E90FF" stroke-width="3.5" stroke-linecap="square"/>
    <line x1="55" y1="55" x2="18" y2="82" stroke="#F97316" stroke-width="2" stroke-linecap="square" opacity="0.45"/>
    <line x1="55" y1="55" x2="92" y2="82" stroke="#F97316" stroke-width="2" stroke-linecap="square" opacity="0.45"/>
  </g>

  <!-- HORIZON wordmark -->
  <text x="380" y="258" font-family="monospace" font-size="56" font-weight="700" fill="#F97316" letter-spacing="3">HORIZON</text>
  <line x1="380" y1="278" x2="416" y2="278" stroke="#2a3f5c" stroke-width="1"/>
  <text x="424" y="283" font-family="monospace" font-size="12" font-weight="500" fill="#5a6f8a" letter-spacing="3">SEE FURTHER. ACT FASTER.</text>

  <!-- Divider -->
  <line x1="640" y1="318" x2="640" y2="338" stroke="#1e2d44" stroke-width="1"/>

  <!-- Synapse icon -->
  <g transform="translate(280, 310) scale(0.65)">
    <line x1="55" y1="55" x2="28" y2="24" stroke="#1E90FF" stroke-width="2.5" stroke-linecap="square"/>
    <line x1="55" y1="55" x2="82" y2="24" stroke="#1E90FF" stroke-width="2.5" stroke-linecap="square"/>
    <line x1="55" y1="55" x2="90" y2="50" stroke="#1E90FF" stroke-width="2.5" stroke-linecap="square"/>
    <line x1="55" y1="55" x2="26" y2="76" stroke="#1E90FF" stroke-width="2.5" stroke-linecap="square"/>
    <line x1="55" y1="55" x2="78" y2="86" stroke="#8B5CF6" stroke-width="3.5" stroke-linecap="square"/>
    <circle cx="28" cy="24" r="4.5" fill="none" stroke="#1E90FF" stroke-width="2"/>
    <circle cx="82" cy="24" r="3.5" fill="none" stroke="#1E90FF" stroke-width="2"/>
    <circle cx="90" cy="50" r="3.5" fill="none" stroke="#1E90FF" stroke-width="2"/>
    <circle cx="26" cy="76" r="3.5" fill="none" stroke="#1E90FF" stroke-width="2"/>
    <circle cx="78" cy="86" r="5.5" fill="#8B5CF6"/>
    <circle cx="55" cy="55" r="7" fill="none" stroke="#1E90FF" stroke-width="3"/>
  </g>

  <!-- SYNAPSE wordmark -->
  <text x="380" y="370" font-family="monospace" font-size="56" font-weight="700" fill="#8B5CF6" letter-spacing="3">SYNAPSE</text>
  <line x1="380" y1="390" x2="416" y2="390" stroke="#4C1D95" stroke-width="1" opacity="0.6"/>
  <text x="424" y="395" font-family="monospace" font-size="12" font-weight="500" fill="#5a6f8a" letter-spacing="3">ON-BOARD INTELLIGENCE</text>

  <!-- Subtitle -->
  <text x="640" y="465" font-family="monospace" font-size="14" font-weight="400" fill="#5a6f8a" letter-spacing="2" text-anchor="middle">EMBEDDED INTELLIGENCE FOR API SECURITY &amp; APPLICATION DEFENSE</text>

  <!-- Stats -->
  <g transform="translate(0, 510)" text-anchor="middle">
    <text x="320" y="0" font-family="monospace" font-size="22" fill="#F97316" letter-spacing="1">&lt;1ms</text>
    <text x="320" y="18" font-family="monospace" font-size="9" fill="#5a6f8a" letter-spacing="2">DETECTION</text>
    <text x="480" y="0" font-family="monospace" font-size="22" fill="#1E90FF" letter-spacing="1">15MB</text>
    <text x="480" y="18" font-family="monospace" font-size="9" fill="#5a6f8a" letter-spacing="2">BINARY</text>
    <text x="640" y="0" font-family="monospace" font-size="22" fill="#8B5CF6" letter-spacing="1">500+</text>
    <text x="640" y="18" font-family="monospace" font-size="9" fill="#5a6f8a" letter-spacing="2">BOT SIGS</text>
    <text x="800" y="0" font-family="monospace" font-size="22" fill="#10B981" letter-spacing="1">8+</text>
    <text x="800" y="18" font-family="monospace" font-size="9" fill="#5a6f8a" letter-spacing="2">DETECTORS</text>
    <text x="960" y="0" font-family="monospace" font-size="22" fill="#e8ecf4" letter-spacing="1">22+</text>
    <text x="960" y="18" font-family="monospace" font-size="9" fill="#5a6f8a" letter-spacing="2">DLP PATTERNS</text>
  </g>

  <!-- Atlas Crew footer -->
  <line x1="580" y1="580" x2="596" y2="580" stroke="#2a3f5c" stroke-width="1"/>
  <text x="640" y="584" font-family="monospace" font-size="10" fill="#5a6f8a" letter-spacing="2.5" text-anchor="middle">ATLAS CREW</text>
  <line x1="684" y1="580" x2="700" y2="580" stroke="#2a3f5c" stroke-width="1"/>
</svg>
