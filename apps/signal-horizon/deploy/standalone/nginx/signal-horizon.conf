server {
    listen 80;
    server_name signal-horizon.example.com;

    return 301 https://$host$request_uri;
}

server {
    # For Nginx older than 1.25.1, use: listen 443 ssl http2;
    listen 443 ssl;
    http2 on;
    server_name signal-horizon.example.com;

    ssl_certificate /etc/letsencrypt/live/signal-horizon.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/signal-horizon.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SignalHorizonTLS:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    # Tighten this starter policy after validating any external asset or auth flows you add.
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://signal-horizon.example.com wss://signal-horizon.example.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self';" always;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }
}
