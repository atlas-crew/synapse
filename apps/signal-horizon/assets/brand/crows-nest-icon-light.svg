<?xml version="1.0" encoding="UTF-8"?>
<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="6" fill="#0057B7"/>
  <rect x="7" y="7" width="86" height="86" rx="4" fill="#001E62"/>
  
  <!-- Spyglass/telescope -->
  <g transform="rotate(-30 50 50)">
    <!-- Main barrel -->
    <rect x="30" y="44" width="45" height="12" rx="2" fill="white"/>
    
    <!-- Lens end (larger) -->
    <ellipse cx="78" cy="50" rx="8" ry="10" fill="#D62598"/>
    <ellipse cx="78" cy="50" rx="5" ry="7" fill="white" opacity="0.5"/>
    
    <!-- Eyepiece end -->
    <rect x="22" y="46" width="10" height="8" rx="2" fill="#D62598"/>
    
    <!-- Barrel rings -->
    <rect x="40" y="43" width="3" height="14" fill="#D62598"/>
    <rect x="55" y="43" width="3" height="14" fill="#D62598"/>
  </g>
  
  <!-- Sight lines radiating from lens -->
  <g stroke="white" stroke-width="1.5" opacity="0.5">
    <line x1="75" y1="30" x2="85" y2="18"/>
    <line x1="80" y1="35" x2="90" y2="30"/>
    <line x1="78" y1="25" x2="85" y2="12"/>
  </g>
</svg>
