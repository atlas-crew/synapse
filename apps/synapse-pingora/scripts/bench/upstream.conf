# Null-backend nginx config for Synapse benchmark runs.
#
# Runs in the foreground on 127.0.0.1:8080, responds to every path with a
# fixed 200 JSON body. Zero application latency — Synapse's proxy and WAF
# work becomes the dominant cost in the measurement, which is the whole
# point.
#
# Start with:   scripts/bench/start-upstream.sh
# Run alongside Synapse on the SUT; point Synapse's config.bench.yaml
# upstreams at 127.0.0.1:8080 (already the default).

worker_processes  auto;
daemon            off;
error_log         stderr warn;
pid               /tmp/synapse-bench-upstream.pid;

events {
    worker_connections  4096;
    multi_accept        on;
}

http {
    access_log off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 10000;
    types_hash_max_size 2048;

    # No MIME map needed — we only ever serve one body.
    default_type application/json;

    server {
        listen       127.0.0.1:8080 reuseport;
        server_name  _;

        # Match every request. Fixed Content-Length so clients can
        # pipeline freely; no dynamic work in the hot path.
        location / {
            add_header X-Bench-Upstream "synapse-null-backend" always;
            return 200 '{"ok":true}';
        }
    }
}
