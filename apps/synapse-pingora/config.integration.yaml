server:
  listen: "0.0.0.0:6190"
  workers: 1
  admin_listen: "0.0.0.0:6191"

upstreams:
  - host: "127.0.0.1"
    port: 8080

detection:
  sqli: true
  xss: true
  path_traversal: true
  action: "block"
  block_status: 403
  rules_path: "data/rules.json"

telemetry:
  enabled: true
  endpoint: "http://localhost:3100/telemetry"

logging:
  level: "info"
  format: "text"
