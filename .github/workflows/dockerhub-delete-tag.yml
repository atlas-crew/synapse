name: Delete Docker Hub tag

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: Docker Hub namespace
        type: string
        required: false
        default: nickcrew
      repository:
        description: Docker Hub repository
        type: choice
        options:
          - synapse-fleet
          - synapse-waf
        default: synapse-fleet
      tag:
        description: Tag to delete
        type: string
        required: true

permissions:
  contents: read

jobs:
  delete-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: docker-hub
    steps:
      - name: Delete requested tag from Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          NAMESPACE: ${{ inputs.namespace }}
          REPOSITORY: ${{ inputs.repository }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ -z "$TAG" ]]; then
            echo "::error::tag input is required"
            exit 1
          fi

          LOGIN_PAYLOAD=$(jq -nc --arg username "$DOCKERHUB_USERNAME" --arg password "$DOCKERHUB_TOKEN" '{username:$username,password:$password}')
          JWT=$(curl -sSL https://hub.docker.com/v2/users/login -H 'Content-Type: application/json' -d "$LOGIN_PAYLOAD" | jq -r '.token')

          if [[ -z "$JWT" || "$JWT" == "null" ]]; then
            echo "::error::failed to obtain Docker Hub JWT"
            exit 1
          fi

          DELETE_STATUS=$(curl -sS -o /tmp/dockerhub-delete-response.json -w "%{http_code}" -X DELETE "https://hub.docker.com/v2/namespaces/$NAMESPACE/repositories/$REPOSITORY/tags/$TAG" -H "Authorization: Bearer $JWT")

          if [[ "$DELETE_STATUS" != "204" && "$DELETE_STATUS" != "202" && "$DELETE_STATUS" != "200" ]]; then
            echo "::error::Docker Hub tag delete failed with HTTP $DELETE_STATUS"
            cat /tmp/dockerhub-delete-response.json || true
            exit 1
          fi

          for attempt in 1 2 3 4 5; do
            VERIFY_STATUS=$(curl -sS -o /tmp/dockerhub-verify-response.json -w "%{http_code}" "https://hub.docker.com/v2/namespaces/$NAMESPACE/repositories/$REPOSITORY/tags/$TAG" -H "Authorization: Bearer $JWT")

            if [[ "$VERIFY_STATUS" == "404" ]]; then
              echo "Deleted $NAMESPACE/$REPOSITORY:$TAG from Docker Hub"
              exit 0
            fi

            if [[ "$attempt" -lt 5 ]]; then
              sleep 3
            fi
          done

          echo "::error::Docker Hub still returns tag $TAG (HTTP $VERIFY_STATUS)"
          cat /tmp/dockerhub-verify-response.json || true
          exit 1
