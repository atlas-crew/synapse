name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'brand/horizon-brand-guidelines/**'
      - 'brand/infographics/**'
      - 'brand/social/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build VitePress docs
        working-directory: site
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/docs
          # VitePress output goes under /docs/
          cp -r site/.vitepress/dist/* _site/docs/
          # Landing page becomes the root
          cp site/horizon.html _site/index.html
          # Copy HTML infographics from brand directory (referenced by landing page)
          mkdir -p _site/infographics
          cp brand/infographics/*.html _site/infographics/
          # OG image for social previews
          cp brand/social/edge-protection-social.png _site/og-image.png

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
