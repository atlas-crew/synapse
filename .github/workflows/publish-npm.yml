name: Publish npm packages

on:
  push:
    tags:
      - 'synapse-api-v*'
      - 'synapse-client-v*'
      - 'synapse-fleet-v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        type: choice
        options:
          - synapse-api
          - synapse-client
          - synapse-fleet
          - both
          - all
        default: both
      dry_run:
        description: 'Dry run (validate without publishing)'
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  publish-synapse-api:
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/synapse-api-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.package == 'synapse-api' || inputs.package == 'both' || inputs.package == 'all'))
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '' || 'npm' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @atlascrew/synapse-api build

      - name: Test
        run: pnpm --filter @atlascrew/synapse-api test

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/synapse-api-v')
        working-directory: packages/synapse-api
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/synapse-api-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        working-directory: packages/synapse-api
        run: pnpm publish --dry-run --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: "!(github.event_name == 'workflow_dispatch' && inputs.dry_run)"
        working-directory: packages/synapse-api
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-synapse-client:
    runs-on: ubuntu-latest
    needs: publish-synapse-api
    if: >-
      always() &&
      (startsWith(github.ref, 'refs/tags/synapse-client-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.package == 'synapse-client' || inputs.package == 'both' || inputs.package == 'all')))
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '' || 'npm' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build synapse-api (dependency)
        run: pnpm --filter @atlascrew/synapse-api build

      - name: Build synapse-client
        run: pnpm --filter @atlascrew/synapse-client build

      - name: Test
        run: pnpm --filter @atlascrew/synapse-client test

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/synapse-client-v')
        working-directory: apps/synapse-client
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/synapse-client-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        working-directory: apps/synapse-client
        run: pnpm publish --dry-run --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: "!(github.event_name == 'workflow_dispatch' && inputs.dry_run)"
        working-directory: apps/synapse-client
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-synapse-fleet:
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/synapse-fleet-v') ||
      (github.event_name == 'workflow_dispatch' && (inputs.package == 'synapse-fleet' || inputs.package == 'all'))
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '' || 'npm' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Internal workspace package name (@atlascrew/signal-horizon-api) is
      # intentionally unchanged per ADR-0003 decision C. The published package
      # is @atlascrew/synapse-fleet, produced by the standalone release script.
      - name: Generate Prisma client for API tests
        run: pnpm --filter @atlascrew/signal-horizon-api db:generate

      - name: Test Synapse Fleet API
        run: pnpm --filter @atlascrew/signal-horizon-api test

      - name: Build standalone release bundle
        run: pnpm signal-horizon:release

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/synapse-fleet-v')
        working-directory: apps/signal-horizon/out/signal-horizon-standalone
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/synapse-fleet-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        working-directory: apps/signal-horizon/out/signal-horizon-standalone
        run: pnpm publish --dry-run --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: "!(github.event_name == 'workflow_dispatch' && inputs.dry_run)"
        working-directory: apps/signal-horizon/out/signal-horizon-standalone
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify package is visible on npm
        if: "!(github.event_name == 'workflow_dispatch' && inputs.dry_run)"
        working-directory: apps/signal-horizon/out/signal-horizon-standalone
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          for attempt in $(seq 1 18); do
            PUBLISHED_VERSION=$(npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null || true)
            if [ "$PUBLISHED_VERSION" = "$PKG_VERSION" ]; then
              echo "Verified ${PKG_NAME}@${PKG_VERSION} on npm"
              exit 0
            fi

            echo "Package not visible yet (attempt ${attempt}/18); waiting 10s..."
            sleep 10
          done

          echo "${PKG_NAME}@${PKG_VERSION} did not become visible on npm within the retry window"
          exit 1
