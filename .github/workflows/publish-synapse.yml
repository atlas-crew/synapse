name: Publish synapse-waf

on:
  push:
    tags:
      - 'synapse-waf-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (validate without publishing)'
        type: boolean
        default: true

permissions:
  contents: read

defaults:
  run:
    working-directory: apps/synapse-pingora

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/synapse-pingora

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libssl-dev libclang-dev pkg-config

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -W clippy::all

      - name: Run tests
        run: cargo test

      - name: Verify package
        run: cargo package --list

  publish:
    needs: validate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/synapse-waf-v') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libssl-dev libclang-dev pkg-config

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/synapse-waf-v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/synapse-waf-v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
